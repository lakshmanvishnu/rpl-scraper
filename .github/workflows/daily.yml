name: Daily RPL scrape

on:
  schedule:
    # 19:00 UTC = 00:30 IST — runs after the day's matches finish (~21:45 IST).
    # Adjust if match times change. Note: GitHub may delay scheduled runs a bit.
    - cron: "0 19 * * *"
  workflow_dispatch: {}   # also lets you trigger it manually from the Actions tab

permissions:
  contents: write          # needed to commit the refreshed CSVs back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper (writes CSVs + syncs Google Sheets)
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          # league ends ~28 Jun 2026; stop scraping after this date (YYYYMMDD).
          # after this the job still runs but no-ops, so nothing changes.
          STOP_AFTER: "20260630"
        run: |
          if [ "$(date -u +%Y%m%d)" -gt "$STOP_AFTER" ]; then
            echo "Past $STOP_AFTER — league over, skipping scrape."
            exit 0
          fi
          python3 rugby_match_scrap.py

      - name: Commit refreshed CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv
          git diff --staged --quiet || git commit -m "Daily data refresh [skip ci]"
          git push
